name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

# Restrict default token permissions for all jobs.
permissions:
  contents: read

jobs:
  lint-python:
    name: Python lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 python/ \
            --max-line-length=99 \
            --extend-ignore=E203,W503 \
            --exclude=python/.venv,python/venv,python/__pycache__

  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all JSON files are valid
        run: |
          find . -name "*.json" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | while read f; do
                python3 -c "import json, sys; json.load(open('$f'))" \
                  && echo "OK: $f" \
                  || { echo "INVALID JSON: $f"; exit 1; }
              done

  cmake-configure:
    name: CMake configure (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and OpenCV dev headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopencv-dev pkg-config

      - name: CMake configure
        run: |
          cmake -S . -B /tmp/cmake-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest numpy

      - name: Run tests
        run: |
          cd python
          python -m pytest tests/ -v \
            --ignore=tests/test_modules.py \
            --ignore=tests/test_packaging.py \
            -k "not face_recognition"
